<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Home</title>
</head>
<body>

<th:block th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
    <title th:text="#{admin.title}">Admin Home</title>
    <section>
        <div class="card shadow mb-4">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0"><i class="bi bi-shield-lock-fill me-2"></i><span th:text="#{admin.title}">Admin Dashboard</span></h4>
            </div>
            <div class="card-body">
                <p class="lead">
                    <span th:text="#{header.welcome}">Welcome</span>,
                    <strong th:if="${currentUser} != null" th:text="${currentUser.getName() + ' ' + currentUser.getSurname()}"></strong>!
                </p>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <div class="card h-100 shadow-sm">
                    <div class="card-body text-center">
                        <i class="bi bi-people-fill display-4 text-primary mb-3"></i>
                        <h5 class="card-title" th:text="#{header.students}">Students</h5>
                        <p class="card-text" th:text="#{admin.manageStudents}">View and manage student records.</p>
                        <a href="/students" class="btn btn-primary">
                            <i class="bi bi-arrow-right me-1"></i><span th:text="#{admin.go}">Go</span>
                        </a>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <div class="card h-100 shadow-sm">
                    <div class="card-body text-center">
                        <i class="bi bi-book-fill display-4 text-success mb-3"></i>
                        <h5 class="card-title" th:text="#{header.courses}">Courses</h5>
                        <p class="card-text" th:text="#{admin.manageCourses}">View and manage course offerings.</p>
                        <a href="/courses" class="btn btn-success">
                            <i class="bi bi-arrow-right me-1"></i><span th:text="#{admin.go}">Go</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</th:block>

</body>
</html>
