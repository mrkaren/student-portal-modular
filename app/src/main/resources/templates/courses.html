<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Courses</title>
</head>
<body>

<th:block th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
    <title th:text="#{header.courses}">Courses</title>
    <section>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-book-fill me-2"></i><span th:text="#{header.courses}">Courses</span></h2>
            <a href="/courses/add" class="btn btn-success">
                <i class="bi bi-plus-circle me-1"></i><span th:text="#{courses.add}">Add Course</span>
            </a>
        </div>

        <div th:if="${courses == null || courses.isEmpty()}" class="alert alert-info text-center">
            <i class="bi bi-info-circle me-1"></i><span th:text="#{courses.empty}">No courses found.</span>
        </div>

        <div th:if="${courses != null && !courses.isEmpty()}" class="table-responsive">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th th:text="#{table.id}">Id</th>
                        <th th:text="#{form.name}">Name</th>
                        <th th:text="#{table.price}">Price</th>
                        <th th:text="#{table.action}">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${courses}">
                        <td th:text="${c.id}"></td>
                        <td th:text="${c.name}"></td>
                        <td th:text="${c.price}"></td>
                        <td>
                            <a th:href="@{/courses/delete(id=${c.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Are you sure you want to delete this course?');">
                                <i class="bi bi-trash me-1"></i><span th:text="#{action.delete}">Delete</span>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</th:block>

</body>
</html>
