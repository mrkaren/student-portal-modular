<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Verify User</title>
</head>
<body>

<th:block th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
    <section>
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow">

                    <div class="card-body p-4">
                        <form th:action="@{/user/verify}" method="post">
                            <div class="mb-3">
                                <input type="hidden" class="form-control" id="email" name="email" th:value="${email}">
                            </div>
                            <div class="mb-3">
                                <label for="verifyCode" class="form-label">code</label>
                                <input type="text" class="form-control" id="verifyCode" name="verifyCode">
                            </div>
                            <button type="submit" class="btn btn-primary w-100" >Verify</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</th:block>

</body>
</html>
