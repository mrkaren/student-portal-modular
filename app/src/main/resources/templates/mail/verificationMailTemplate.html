<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f7fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <table role="presentation" style="width: 100%; border-collapse: collapse; padding: 40px 0;">
        <tr>
            <td style="text-align: center;">
                <table role="presentation" style="width: 100%; max-width: 520px; margin: 0 auto; background-color: #ffffff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08); overflow: hidden;">
                    <!-- Header -->
                    <tr>
                        <td style="background: linear-gradient(135deg, #4a90d9, #6366f1); padding: 36px 40px; text-align: center;">
                            <div style="font-size: 40px; margin-bottom: 8px;">&#9993;</div>
                            <h1 style="margin: 0; color: #ffffff; font-size: 22px; font-weight: 600; letter-spacing: 0.5px;">Email Verification</h1>
                        </td>
                    </tr>
                    <!-- Body -->
                    <tr>
                        <td style="padding: 40px;">
                            <p style="margin: 0 0 16px; color: #374151; font-size: 15px; line-height: 1.6;">
                                Hello! Please use the verification code below to complete your registration:
                            </p>
                            <table role="presentation" style="width: 100%; border-collapse: collapse; margin: 24px 0;">
                                <tr>
                                    <td style="text-align: center; padding: 20px; background-color: #f0f4ff; border-radius: 8px; border: 2px dashed #a5b4fc;">
                                        <span th:text="${code}" style="font-size: 32px; font-weight: 700; letter-spacing: 6px; color: #4338ca; font-family: 'Courier New', monospace;"></span>
                                    </td>
                                </tr>
                            </table>
                            <p style="margin: 16px 0 0; color: #6b7280; font-size: 13px; line-height: 1.6;">
                                If you did not request this code, you can safely ignore this email.
                            </p>
                        </td>
                    </tr>
                    <!-- Footer -->
                    <tr>
                        <td style="padding: 20px 40px; background-color: #f9fafb; text-align: center; border-top: 1px solid #e5e7eb;">
                            <p style="margin: 0; color: #9ca3af; font-size: 12px;">
                                &copy; 2026 Student Portal. All rights reserved.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
