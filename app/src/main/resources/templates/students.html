<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Students</title>
</head>
<body>

<th:block th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
    <title th:text="#{header.students}">Students</title>
    <section>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-people-fill me-2"></i><span th:text="#{header.students}">Students</span></h2>
            <div>
                Filter:
                <form action="/students" method="get">
                    <input type="text" name="name" th:value="${searchCriteria != null ? searchCriteria.getName() : ''}"
                           placeholder="name">
                    <input type="text" name="surname"
                           th:value="${searchCriteria != null ? searchCriteria.getSurname():''}" placeholder="surname">
                    <input type="text" name="email" th:value="${searchCriteria != null ? searchCriteria.getEmail():''}"
                           placeholder="email">

                    <input type="submit" value="Search">
                </form>
            </div>
            <div>
                <a href="/students" class="btn btn-outline-secondary me-2">
                    <i class="bi bi-arrow-repeat me-1"></i><span th:text="#{students.showAll}">Show All</span>
                </a>
                <a href="/students/add" class="btn btn-success">
                    <i class="bi bi-plus-circle me-1"></i><span th:text="#{students.add}">Add Student</span>
                </a>
            </div>
        </div>

        <div th:if="${students == null || students.isEmpty()}" class="alert alert-info text-center">
            <i class="bi bi-info-circle me-1"></i><span th:text="#{students.empty}">No students found.</span>
        </div>

        <div th:if="${students != null && !students.isEmpty()}" class="table-responsive">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th th:text="#{table.picture}">Picture</th>
                    <th th:text="#{table.id}">Id</th>
                    <th th:text="#{form.name}">Name</th>
                    <th th:text="#{form.surname}">Surname</th>
                    <th th:text="#{table.email}">Email</th>
                    <th th:text="#{table.course}">Course</th>
                    <th th:text="#{table.skills}">Skills</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="student : ${students}">
                    <td>
                        <img th:if="${student.getPictureName() != null && !student.getPictureName().equals('')}"
                             th:src="@{/image/get(picName=${student.pictureName})}"
                             class="student-thumbnail" alt="Student photo">
                        <img th:if="${student.getPictureName() == null || student.getPictureName().equals('')}"
                             th:src="@{/images/img.png}"
                             class="student-thumbnail" alt="Default photo">
                    </td>
                    <td th:text="${student.id}"></td>
                    <td th:text="${student.name}"></td>
                    <td th:text="${student.surname}"></td>
                    <td th:text="${student.email}"></td>
                    <td>
                        <a th:href="@{/students(courseid=${student.course.id})}"
                           class="badge bg-info text-decoration-none"
                           th:text="${student.course.name}"></a>
                    </td>
                    <td>
                        <a th:each="skill : ${student.getSkills()}"
                           th:href="@{/students(skillId=${skill.id})}"
                           class="badge bg-secondary text-decoration-none"
                           th:text="${skill.name}"></a>
                    </td>
                </tr>
                </tbody>
            </table>

            <nav th:if="${students.totalPages > 1}" aria-label="Page navigation" class="mt-4">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${students.number == 0} ? 'disabled'">
                        <a class="page-link" th:href="@{/students(size=${students.size}, page=${students.number})}">&laquo;</a>
                    </li>
                    <li th:each="pageNumber : ${pageNumbers}"
                        class="page-item"
                        th:classappend="${pageNumber == students.number + 1} ? 'active'">
                        <a class="page-link"
                           th:href="@{/students(size=${students.size}, page=${pageNumber})}"
                           th:text="${pageNumber}"></a>
                    </li>
                    <li class="page-item" th:classappend="${students.number + 1 == students.totalPages} ? 'disabled'">
                        <a class="page-link" th:href="@{/students(size=${students.size}, page=${students.number + 2})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </section>
</th:block>

</body>
</html>
