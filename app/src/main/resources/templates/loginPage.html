<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>

<th:block th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
    <title th:text="#{main.login}">Login</title>
    <section>
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h4 class="mb-0"><i class="bi bi-box-arrow-in-right me-2"></i><span th:text="#{main.login}">Login</span></h4>
                    </div>
                    <div class="card-body p-4">
                        <div th:if="${msg} != null" class="alert alert-danger" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-1"></i>
                            <span th:text="${msg}"></span>
                        </div>
                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label" th:text="#{form.username}">Username</label>
                                <input type="text" class="form-control" id="username" name="username" th:placeholder="#{form.username}">
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label" th:text="#{form.password}">Password</label>
                                <input type="password" class="form-control" id="password" name="password" th:placeholder="#{form.password}">
                            </div>
                            <button type="submit" class="btn btn-primary w-100" th:text="#{main.login}">Login</button>
                        </form>
                        <div class="text-center mt-3">
                            <span th:text="#{login.noAccount}">Don't have an account?</span>
                            <a href="/registerPage" th:text="#{main.register}">Register</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</th:block>

</body>
</html>
